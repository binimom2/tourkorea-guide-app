<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>골프 견적</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--fairway:#123A2B;--fairway-deep:#0B231A;--sand:#E9DFC8;--paper:#F7F3E9;--marigold:#E8A33D;--ink:#15211C;--line:rgba(18,58,43,.18);--muted:#5E6F66;--danger:#c0492f;--font:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;--num:"JetBrains Mono",ui-monospace,monospace;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.5}
/* 3박4일(4줄) 일정이 스크롤 없이 한 화면에 들어오도록 전체 밀도를 높였다 */
.wrap{max-width:1040px;margin:0 auto;padding:11px 14px 16px}
.head{border-bottom:2px solid var(--fairway);padding-bottom:6px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
.head .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.eyebrow{font-size:10px;letter-spacing:.2em;color:var(--muted);font-weight:600}
.head h1{margin:1px 0 0;font-size:clamp(18px,2.6vw,22px);font-weight:800;letter-spacing:-.03em}
.head a,.head button.link{background:none;border:1px solid var(--line);border-radius:999px;padding:4px 10px;font:inherit;font-size:11.5px;font-weight:700;color:var(--fairway);text-decoration:none;cursor:pointer}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px 10px;margin-bottom:7px}
.card h2{margin:0 0 6px;font-size:13.5px;font-weight:800}
.grid{display:grid;gap:8px}
@media(min-width:640px){.grid.g4{grid-template-columns:repeat(4,1fr)}.grid.g2{grid-template-columns:1fr 1fr}.grid.g3{grid-template-columns:repeat(3,1fr)}}
.f{display:flex;flex-direction:column;gap:3px}
.f label{font-size:11px;font-weight:700;color:var(--muted)}
.f input,.f select{font:inherit;font-size:13px;padding:6px 9px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink)}
.f input:focus,.f select:focus{outline:2px solid var(--marigold);outline-offset:1px;background:#fff}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px}
/* 지역 선택 — 가는 순서대로 클릭, 고른 것만 아래에 펼쳐 박수 입력 */
.chips{display:flex;flex-wrap:wrap;gap:6px;padding-top:3px}
.chip{display:flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:5px 13px;font:inherit;font-size:13px;font-weight:700;color:var(--fairway);cursor:pointer}
.chip:hover{border-color:var(--fairway)}
.chip.on{background:var(--fairway);color:var(--sand);border-color:var(--fairway)}
.chip .seq{width:16px;height:16px;border-radius:50%;background:var(--marigold);color:#3a2400;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.picked{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.picked:empty{display:none}
.pick{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 8px;font-size:13px;font-weight:700;color:var(--fairway)}
.pick .seq{width:17px;height:17px;border-radius:50%;background:var(--fairway);color:var(--sand);font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.pick input{width:50px;font:inherit;font-size:13px;text-align:right;padding:4px 6px;border:1px solid var(--line);border-radius:6px;background:var(--paper)}
.pick .x{color:var(--danger);cursor:pointer;font-weight:800;padding-left:2px}
.pick small{font-weight:600;color:var(--muted)}
/* 날짜별 라운딩 — 한 줄에 한 날짜(날짜·요일·구분을 한 줄로 붙여 높이를 줄임) */
.day{display:flex;flex-wrap:wrap;align-items:center;gap:7px;padding:4px 8px;border:1px solid var(--line);border-radius:8px;margin-bottom:4px;background:var(--paper)}
.day .dlabel{font-weight:700;font-size:13px;min-width:152px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.day .dlabel small{font-weight:600;font-size:11px;color:var(--muted)}
.day .rchk{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;white-space:nowrap}
.day select{font:inherit;font-size:12.5px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;background:#fff}
.day .reg{width:78px}.day .course{flex:1;min-width:130px}.day .holes{width:78px}
.day.off{opacity:.55}
.badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--sand);color:var(--fairway)}
.badge.we{background:#f6dcae;color:#7a4a00}
/* 결과 */
.card.res{background:var(--fairway);color:var(--sand);border:0}
.card.res h2{color:var(--sand)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
.res th,.res td{padding:3.5px 4px;text-align:left}
.res thead th{font-size:10px;letter-spacing:.14em;opacity:.6;font-weight:600}
.res tbody tr{border-top:1px solid rgba(233,223,200,.14)}
.res td.n{text-align:right;font-family:var(--num);white-space:nowrap}
.res td .sub{display:block;font-size:11px;opacity:.6;margin-top:1px}
.res tfoot td{border-top:2px solid var(--marigold);padding-top:9px;font-weight:800;font-size:17px}
.res tfoot td.n{font-size:21px;color:var(--marigold)}
.perp{padding-top:7px;font-size:12.5px;opacity:.8}
.warn{color:#ffcaa8}
/* 로그인 */
#golfLogin{position:fixed;inset:0;background:var(--fairway-deep);display:none;align-items:center;justify-content:center;z-index:50}
#golfLogin .box{background:#fff;border-radius:18px;padding:30px 26px;width:340px;max-width:90vw}
#golfLogin h1{margin:0 0 4px;font-size:20px;font-weight:800;color:var(--fairway)}
#golfLogin p{margin:0 0 16px;font-size:12.5px;color:var(--muted)}
#golfLogin label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:12px 0 5px}
#golfLogin input{width:100%;font:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper)}
#golfLogin button{width:100%;margin-top:18px;font:inherit;font-weight:700;font-size:15px;padding:12px;border:0;border-radius:9px;background:var(--fairway);color:var(--sand);cursor:pointer}
</style>
</head>
<body>
<div id="golfLogin"><div class="box">
  <h1>⛳ 골프 견적</h1><p>기존 앱과 동일한 계정으로 로그인</p>
  <label>아이디</label><input id="glid" autocomplete="off" onkeydown="if(event.key==='Enter')gLogin()">
  <label>비밀번호</label><input id="glpw" type="password" autocomplete="off" onkeydown="if(event.key==='Enter')gLogin()">
  <button id="gbtn" onclick="gLogin()">로그인</button>
  <div id="gerr" style="color:#c0492f;font-size:12.5px;margin-top:10px;min-height:16px"></div>
</div></div>

<div class="wrap" id="golfApp" style="display:none">
  <header class="head">
    <div>
      <div class="eyebrow">THAILAND GOLF</div>
      <h1>골프 견적 내기</h1>
    </div>
    <div class="top">
      <a href="/golf/admin/" id="adminLink" style="display:none;background:var(--fairway);color:var(--sand)">🔧 코드·요금 관리</a>
      <a href="/travel/">← 예약관리</a>
      <button class="link" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="card">
    <h2>1. 기본 정보</h2>
    <div class="grid g3">
      <div class="f"><label>출발 일자</label><input type="date" id="startDate"></div>
      <div class="f"><label>인원수</label><input type="number" id="pax" min="1" value="4"></div>
      <div class="f"><label>일정</label><select id="tripSel"></select></div>
    </div>
    <div class="f" style="margin-top:8px">
      <label>지역 선택 <span style="font-weight:400;color:var(--muted)">가시는 순서대로 클릭하세요</span></label>
      <div class="chips" id="regChips"></div>
      <div class="picked" id="regPicked"></div>
      <div class="hint" id="paxInfo"></div>
    </div>
  </div>

  <div class="card">
    <h2>2. 날짜별 라운딩 <span style="font-weight:400;font-size:11.5px;color:var(--muted)">라운딩할 날만 체크 · 그린피+캐디+전동카 포함</span></h2>
    <div id="days"></div>
  </div>

  <div class="card">
    <h2>3. 차량 · 숙소 · 가이드 <span style="font-weight:400;font-size:11.5px;color:var(--muted)">(선택)</span></h2>
    <div class="grid g3" style="margin-bottom:8px;">
      <div class="f"><label>차량 요금 기준</label><select id="vehGroup"></select></div>
      <div class="f" style="grid-column:span 2;"><label>수송밴 <span style="font-weight:400;color:var(--muted)">(선택)</span></label>
        <div id="transferWrap" class="chips" style="padding-top:0;"></div></div>
    </div>
    <div class="grid g3">
      <div id="hotelWrap" style="display:contents"></div>
      <div class="f"><label>가이드</label><select id="guide">
        <option value="none">가이드 없이</option>
        <option value="한국인가이드">한국인 가이드</option>
        <option value="로컬가이드">로컬 가이드(한국어 가능)</option>
      </select></div>
    </div>
  </div>

  <section class="card res">
    <h2>견적 결과</h2>
    <table>
      <thead><tr><th>항목</th><th class="n">금액 (THB)</th></tr></thead>
      <tbody id="lines"></tbody>
      <tfoot><tr><td>총 합계</td><td class="n" id="total">0</td></tr></tfoot>
    </table>
    <div class="perp" id="perp"></div>
  </section>
  <div class="hint" id="vehNotes"></div>
  <div class="hint">※ 표시 금액은 THB 기준, 항공료 미포함. 태국 공휴일·토·일은 주말 요금 적용.</div>
</div>

<script>

 {n:"방프라",note:"스포츠데이(월·수) 1,650밧 · 카트 진입(의무) · 갤러리 500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[1650,2150],cad:0,crt:0,g9:[1100,1300],cad9:0,crt9:0}]},
 {n:"부라파",note:"36홀 · 스포츠데이(월·수) 2,150밧 · 갤러리 500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[1200,1500],cad:400,crt:850,g9:[650,800],cad9:200,crt9:450}]},

 {n:"시암플랜/워터/롤링",note:"플랜 27홀, 워터·롤링 18홀 · 갤러리 2,500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[3100,4100],cad:500,crt:1000,g9:[1800,2200],cad9:300,crt9:600}]},
 {n:"이스턴스타",note:"주중 오전5 오후6 · 갤러리 500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[2350,3400],cad:0,crt:0,g9:[1400,1700],cad9:0,crt9:0}]},
 {n:"찌짠",note:"주중4 주말4 · 카트 진입(의무) · 갤러리 1,500밧",s:[{from:"2026-04-01",to:"2026-09-30",g18:[3400,4200],cad:450,crt:850,g9:[2350,2850],cad9:250,crt9:450}]},
 {n:"카오키여우",note:"주중5 주말5 · 카트 진입(의무) · 갤러리 500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[1950,2550],cad:0,crt:0,g9:[1100,1400],cad9:0,crt9:0}]},

 {n:"파타비아",note:"주중 오전5 오후6 · 카트 진입(의무) · 갤러리 500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[500,800],cad:350,crt:600,g9:[500,700],cad9:200,crt9:300}]},
 {n:"파타야",note:"스포츠데이(목) 1,900밧 · 갤러리 500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[900,1100],cad:400,crt:700,g9:[600,700],cad9:200,crt9:350}]},
 {n:"피닉스",note:"27홀 · 주중5 주말5 · 카트 진입(의무) · 갤러리 500밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[1400,1900],cad:400,crt:700,g9:[800,1050],cad9:200,crt9:350}]},
 {n:"헤르매스",note:"주중5 주말5 · 카트 진입(의무) · 갤러리 1,300밧",s:[{from:"2026-04-01",to:"2026-10-31",g18:[2000,2300],cad:0,crt:0,g9:[1250,1400],cad9:0,crt9:0}]}
]
};
/* 기본 요금(관리자 저장값 없을 때 폴백) */
const DEFAULT_PRICING = {
  holidays:["2026-05-01","2026-05-04","2026-06-01","2026-06-03","2026-07-28","2026-07-29","2026-07-30","2026-08-12","2026-10-13","2026-10-23","2026-12-07","2026-12-10","2026-12-31"],
  hotels:{"방콕":[{name:"방콕 시내 4성",perNight:2200},{name:"방콕 시내 5성",perNight:3800}],"파타야":[{name:"파타야 비치 4성",perNight:1800},{name:"파타야 비치 5성",perNight:3200}]},
  handlingPeriods:{}, guidePeriods:{}, vehiclePeriods:{}
};
const GUIDE_PERIODS=['1일','1박2일','풀1박2일','2박3일','풀2박3일','3박4일','풀3박4일','1박추가시'];
let P = DEFAULT_PRICING;   // 요금 데이터(공휴일·가이드·핸들링·차량·호텔)

const $=s=>document.querySelector(s);
const won=n=>Math.round(n).toLocaleString('en-US');
const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const isWeekend=d=>[0,6].includes(d.getDay());
const isHoliday=s=>(P.holidays||[]).includes(s);
function seasonOf(course,dateStr){ return (course.s||[]).find(x=>dateStr>=x.from && dateStr<=x.to)||null; }
function ganada(a,b){ return a.n.localeCompare(b.n,'ko'); }
/* 기간 요금 확장: 입력된 최고 기간을 기준으로 초과 박수만큼 "1박추가시" 금액을 더함
   예) 핸들링이 2박3일까지만 있으면 3박 = 2박3일 + 1박추가시×1 */
function tierValue(obj, N, key){
  const order=[['1일',0],['1박2일',1],['2박3일',2],['3박4일',3]];  // 풀 제외한 기준 기간
  const oneMore=((obj||{})['1박추가시']||{})[key]||0;
  let base=null, bn=0;
  order.forEach(([nm,pn])=>{ const v=((obj||{})[nm]||{})[key]; if(v!=null&&v>0&&pn<=N){ base=v; bn=pn; } });
  if(base===null){ for(const [nm,pn] of order){ const v=((obj||{})[nm]||{})[key]; if(v!=null&&v>0){ base=v; bn=pn; break; } } }
  if(base===null) return null;
  return { value: base + oneMore*Math.max(0,N-bn), base, bn, oneMore, extra:Math.max(0,N-bn) };
}

/* ── 지역 선택(가는 순서) ──
   REGIONS = 관리자 코드관리('지역')에서 오는 목록. ROUTE = 클릭한 순서 = 실제 여행 순서. */
let REGIONS=[];
let ROUTE=[];              // [{region, nights}]
let hotelPick={};          // {지역명: 숙소 index} — 다시 그려도 선택이 유지되게
const REGION_FALLBACK=['방콕','파타야','후아힌','칸차나부리','카오야이','아유타야'];

function totalNights(){ return ROUTE.reduce((a,r)=>a+(+r.nights||0),0); }
function tripLabel(n){ return n>0?`${n}박 ${n+1}일`:'당일'; }
function buildTripOptions(){
  const s=$('#tripSel');
  s.innerHTML=Array.from({length:15},(_,n)=>`<option value="${n}">${tripLabel(n)}</option>`).join('');
}
function syncTripSelect(){ $('#tripSel').value=String(totalNights()); }
// 일정을 직접 고치면 뒤쪽 지역 박수를 늘리거나(추가) 뒤에서부터 깎아서(감소) 합을 맞춘다
function applyTripToRoute(n){
  if(!ROUTE.length) return;
  let d=n-totalNights();
  if(d>0){ const last=ROUTE[ROUTE.length-1]; last.nights=(+last.nights||0)+d; return; }
  for(let i=ROUTE.length-1;i>=0&&d<0;i--){
    const take=Math.min(+ROUTE[i].nights||0,-d);
    ROUTE[i].nights=(+ROUTE[i].nights||0)-take; d+=take;
  }
}
function toggleRegion(name){
  const i=ROUTE.findIndex(r=>r.region===name);
  if(i>=0){ ROUTE.splice(i,1); delete hotelPick[name]; }
  else ROUTE.push({region:name,nights:0});   // 박수는 사용자가 직접 입력(일정이 멋대로 늘지 않게)
  refreshAll();
}
function renderRegions(){
  const chips=$('#regChips');
  chips.innerHTML=REGIONS.map(r=>{
    const i=ROUTE.findIndex(x=>x.region===r);
    return `<button type="button" class="chip${i>=0?' on':''}" data-reg-pick="${r}">${i>=0?`<span class="seq">${i+1}</span>`:''}${r}</button>`;
  }).join('');
  $('#regPicked').innerHTML=ROUTE.map((r,i)=>
    `<span class="pick"><span class="seq">${i+1}</span>${r.region}
      <input type="number" min="0" max="14" value="${+r.nights||0}" data-reg-n="${i}"><small>박</small>
      <span class="x" data-reg-del="${i}" title="빼기">✕</span></span>`).join('');
}
function refreshAll(){ renderRegions(); syncTripSelect(); renderVehicleUI(); renderHotels(); buildDays(); calc(); }

/* ── 날짜 행 렌더 ── */
let dayState=[];  // {date, region, round:bool, course:idx, holes}
// 지역 k는 그 지역 박수만큼의 날을 차지하고, 마지막 지역이 체크아웃 날(+1일)까지 갖는다
function regionForDay(i){
  let acc=0;
  for(let k=0;k<ROUTE.length;k++){
    const span=(+ROUTE[k].nights||0)+(k===ROUTE.length-1?1:0);
    if(i<acc+span) return ROUTE[k].region;
    acc+=span;
  }
  return ROUTE.length?ROUTE[ROUTE.length-1].region:'';
}
function regionOptionsHtml(sel){
  const opts=REGIONS.slice(); if(sel&&!opts.includes(sel)) opts.push(sel);
  return opts.map(r=>`<option${r===sel?' selected':''}>${r}</option>`).join('');
}
function buildDays(){
  const wrap=$('#days'); wrap.innerHTML=''; dayState=[];
  if(!ROUTE.length){ wrap.innerHTML='<div class="hint">위에서 지역을 먼저 선택하세요.</div>'; return; }
  const start=$('#startDate').value;
  if(!start){ wrap.innerHTML='<div class="hint">출발 일자를 먼저 선택하세요.</div>'; return; }
  const days=totalNights()+1;
  for(let i=0;i<days;i++){
    const d=new Date(start+'T00:00:00'); d.setDate(d.getDate()+i); const ds=iso(d);
    const we=isWeekend(d)||isHoliday(ds);
    const region=regionForDay(i);
    const st={date:ds, region, round:false, course:'', holes:'18'};
    const st_i=dayState.push(st)-1;
    const row=document.createElement('div'); row.className='day off'; row.dataset.i=st_i;
    row.innerHTML=`
      <div class="dlabel">${ds.slice(5).replace('-','/')} <small>${['일','월','화','수','목','금','토'][d.getDay()]}요일 ${we?'<span class="badge we">주말/휴일</span>':'<span class="badge">주중</span>'}</small></div>
      <label class="rchk"><input type="checkbox" data-r="${st_i}"> 라운딩</label>
      <select class="reg" data-reg="${st_i}">${regionOptionsHtml(region)}</select>
      <select class="course" data-c="${st_i}" disabled></select>
      <select class="holes" data-h="${st_i}" disabled></select>`;
    wrap.appendChild(row);
    fillCourses(st_i);
  }
}
function fillCourses(i){
  const st=dayState[i];
  const sel=document.querySelector(`[data-c="${i}"]`);
  const list=(COURSES[st.region]||[]).slice().sort(ganada);
  sel.innerHTML='<option value="">골프장 선택</option>'+list.map(c=>`<option value="${c.n}">${c.n}</option>`).join('');
  sel.value=st.course||'';
  fillHoles(i);
}
function fillHoles(i){
  const st=dayState[i];
  const sel=document.querySelector(`[data-h="${i}"]`);
  const c=(COURSES[st.region]||[]).find(x=>x.n===st.course);
  let opts=['<option value="18">18홀</option>'];
  if(c){ const has9=(c.s||[]).some(s=>s.g9); if(has9){ opts.push('<option value="27">27홀</option>'); opts.push('<option value="9">9홀</option>'); } }
  sel.innerHTML=opts.join(''); sel.value=st.holes||'18';
}
// 차량 요금 기준(지역 조합) · 수송밴 · 안내문구
let transferPick={};   // {구간명: true}
function renderVehicleUI(){
  const sel=$('#vehGroup');
  const groups=P.vehicleGroups||[];
  const cur=sel.value;
  sel.innerHTML=groups.map((g,i)=>`<option value="${i}">${g.label||'조합'+(i+1)}</option>`).join('')
    || '<option value="">등록된 차량요금 없음</option>';
  if(cur && groups[+cur]) sel.value=cur;
  const tw=$('#transferWrap');
  const list=(P.transfers||[]).filter(t=>t&&t.label&&t.amount);
  tw.innerHTML=list.length
    ? list.map(t=>`<button type="button" class="chip${transferPick[t.label]?' on':''}" data-tr="${t.label}">${t.label} · ${won(t.amount)}</button>`).join('')
    : '<span class="hint" style="margin:0;">등록된 수송밴 없음</span>';
  const nt=$('#vehNotes');
  const notes=(P.vehicleNotes||[]).filter(Boolean);
  nt.innerHTML=notes.length?notes.map(t=>'※ '+t).join('<br>'):'';
  nt.style.display=notes.length?'':'none';
}
// 숙소는 「고른 지역 중 1박 이상인 곳」만 칸을 만든다
function renderHotels(){
  const H=P.hotels||{};
  const wrap=$('#hotelWrap'); wrap.innerHTML='';
  ROUTE.filter(r=>(+r.nights||0)>0).forEach(r=>{
    const list=H[r.region]||[];
    const f=document.createElement('div'); f.className='f';
    const opts=list.map((h,idx)=>`<option value="${idx}"${String(hotelPick[r.region])===String(idx)?' selected':''}>${h.name} · ${won(h.perNight)} THB/박</option>`).join('');
    f.innerHTML=`<label>${r.region} 숙소 <span style="font-weight:400;color:var(--muted)">${r.nights}박</span></label>`+
      `<select data-hotel="${r.region}"><option value="">${list.length?'숙소 없이':'등록된 숙소 없음'}</option>${opts}</select>`;
    wrap.appendChild(f);
  });
}

/* ── 계산 ── */
function calc(){
  if(!window._ready) return;
  const pax=Math.max(1,+$('#pax').value||1);
  const nights=totalNights();
  const rooms=Math.ceil(pax/2);
  $('#paxInfo').textContent=ROUTE.length
    ? `${pax}명 · ${ROUTE.map(r=>`${r.region} ${+r.nights||0}박`).join(' → ')} = 총 ${nights}박 ${nights+1}일`
    : `${pax}명 · 지역을 선택하세요`;
  const lines=[];
  // 1) 골프 (체크된 날)
  dayState.forEach(st=>{
    if(!st.round || !st.course) return;
    const c=(COURSES[st.region]||[]).find(x=>x.n===st.course); if(!c) return;
    const ss=seasonOf(c,st.date);
    const we=isWeekend(new Date(st.date+'T00:00:00'))||isHoliday(st.date);
    const wk=we?1:0;
    const nm=`${c.n} ${st.holes}홀`, dl=`${st.date.slice(5)} ${st.region}`;
    if(!ss){ lines.push({t:nm,s:`${dl} · 해당일 요금 미등록`,v:0,warn:1}); return; }
    let unit=null;
    if(st.holes==='18') unit = ss.g18[wk]!=null ? ss.g18[wk]+ss.cad+ss.crt : null;
    else if(st.holes==='27') unit = (ss.g18[wk]!=null&&ss.g9&&ss.g9[wk]!=null) ? ss.g18[wk]+ss.g9[wk]+ss.cad+ss.cad9+ss.crt+ss.crt9 : null;
    else if(st.holes==='9') unit = (ss.g9&&ss.g9[wk]!=null) ? ss.g9[wk]+ss.cad9+ss.crt9 : null;
    if(unit==null){ lines.push({t:nm,s:`${dl} · ${we?'주말':'주중'} 요금 미등록`,v:0,warn:1}); return; }
    lines.push({t:nm,s:`${dl} · ${we?'주말':'주중'} · ${won(unit)} × ${pax}명`,v:unit*pax});
  });
  // 2) 차량 (선택한 지역 조합의 기간값 + 1박추가 확장)
  const vgIdx=+($('#vehGroup').value||0);
  const vGroup=(P.vehicleGroups||[])[vgIdx];
  const vt=tierValue((vGroup&&vGroup.periods)||{},nights,'amount');
  if(vt){ const vans=Math.ceil(pax/7); lines.push({t:`차량 (12인승 밴)${vGroup&&vGroup.label?' · '+vGroup.label:''}`,s:`${won(vt.value)}${vt.extra?` (기본 ${won(vt.base)} +1박추가 ${won(vt.oneMore)}×${vt.extra})`:''} × ${vans}대`,v:vt.value*vans}); }
  else lines.push({t:'차량',s:'요금 미입력 — 관리에서 입력 필요',v:0,warn:1});
  // 3) 핸들링
  const ht=tierValue(P.handlingPeriods||{},nights,'amount');
  if(ht) lines.push({t:'핸들링 차지',s:`${won(ht.value)}${ht.extra?` (기본 ${won(ht.base)} +1박추가 ${won(ht.oneMore)}×${ht.extra})`:''} × ${pax}명`,v:ht.value*pax});
  else lines.push({t:'핸들링',s:'요금 미입력',v:0,warn:1});
  // 4) 가이드 (기간값 + 1박추가 확장 + 파타야 박당)
  const gt=$('#guide').value;
  if(gt!=='none'){
    const G=(P.guidePeriods||{})[gt];
    const gv=G?tierValue(G,nights,'bkk'):null;
    if(gv){
      lines.push({t:(gt==='한국인가이드'?'한국인 가이드':'로컬 가이드'),s:`${won(gv.value)}${gv.extra?` (기본 ${won(gv.base)} +1박추가 ${won(gv.oneMore)}×${gv.extra})`:''}`,v:gv.value});
    } else lines.push({t:'가이드',s:'요금 미입력',v:0,warn:1});
  }
  // 5) 숙소 — 고른 지역별로
  const H=P.hotels||{};
  ROUTE.forEach(r=>{
    const nn=+r.nights||0; if(!nn) return;
    const idx=hotelPick[r.region];
    if(idx===undefined||idx==='') return;
    const h=(H[r.region]||[])[+idx]; if(!h) return;
    lines.push({t:`숙소 · ${h.name}`,s:`${r.region} · ${won(h.perNight)} × ${nn}박 × ${rooms}실`,v:h.perNight*nn*rooms});
  });
  // 6) 수송밴 (선택한 구간)
  (P.transfers||[]).forEach(t=>{
    if(!t||!t.label||!t.amount||!transferPick[t.label]) return;
    lines.push({t:'수송밴 · '+t.label,s:`${won(t.amount)} × 1대`,v:t.amount});
  });
  const total=lines.reduce((a,b)=>a+b.v,0);
  $('#lines').innerHTML=lines.map(l=>`<tr><td>${l.t}<span class="sub ${l.warn?'warn':''}">${l.s}</span></td><td class="n">${won(l.v)}</td></tr>`).join('')||`<tr><td colspan="2" style="opacity:.6">라운딩할 날을 체크하면 견적이 나옵니다.</td></tr>`;
  $('#total').textContent=won(total);
  $('#perp').textContent=`1인당 약 ${won(total/pax)} THB`;
}

/* ── 이벤트 ── */
// 지역 칩 클릭 / 빼기
document.addEventListener('click',e=>{
  const pick=e.target.closest('[data-reg-pick]');
  if(pick){ toggleRegion(pick.dataset.regPick); return; }
  const del=e.target.closest('[data-reg-del]');
  if(del){ const i=+del.dataset.regDel; const r=ROUTE[i]; if(r) delete hotelPick[r.region]; ROUTE.splice(i,1); refreshAll(); return; }
  const tr=e.target.closest('[data-tr]');
  if(tr){ const k=tr.dataset.tr; transferPick[k]=!transferPick[k]; tr.classList.toggle('on',!!transferPick[k]); calc(); return; }
});
// 지역별 박수 입력
document.addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.regN!==undefined){
    const i=+t.dataset.regN; if(!ROUTE[i]) return;
    ROUTE[i].nights=Math.max(0,+t.value||0);
    syncTripSelect(); renderHotels(); buildDays(); calc();   // 칩은 다시 안 그림(입력 포커스 유지)
    return;
  }
  if(t.id==='pax') calc();
});
document.addEventListener('change',e=>{
  const t=e.target;
  if(t.id==='startDate'){ buildDays(); calc(); return; }
  if(t.id==='vehGroup'){ calc(); return; }
  if(t.id==='tripSel'){ applyTripToRoute(+t.value||0); refreshAll(); return; }
  if(t.dataset.hotel!==undefined){ hotelPick[t.dataset.hotel]=t.value; calc(); return; }
  if(t.dataset.r!==undefined){ const i=+t.dataset.r; dayState[i].round=t.checked; const row=t.closest('.day'); row.classList.toggle('off',!t.checked); document.querySelector(`[data-c="${i}"]`).disabled=!t.checked; document.querySelector(`[data-h="${i}"]`).disabled=!t.checked; }
  if(t.dataset.reg!==undefined){ const i=+t.dataset.reg; dayState[i].region=t.value; dayState[i].course=''; fillCourses(i); }
  if(t.dataset.c!==undefined){ const i=+t.dataset.c; dayState[i].course=t.value; fillHoles(i); }
  if(t.dataset.h!==undefined){ const i=+t.dataset.h; dayState[i].holes=t.value; }
  calc();
});

async function loadPricing(){
  try{ const {data:row}=await sb.from('guide_data').select('data').eq('data_key','golf_pricing').single();
    if(row&&row.data){ const d=row.data; P={
      holidays:(d.holidays&&d.holidays.includes('2026-05-04'))?d.holidays:DEFAULT_PRICING.holidays,
      hotels:DEFAULT_PRICING.hotels,
      handlingPeriods:d.handlingPeriods||{}, guidePeriods:d.guidePeriods||{}, vehiclePeriods:d.vehiclePeriods||{},
      // 차량: 지역 조합별 요금 열. 예전 데이터(단일 vehiclePeriods)만 있으면 한 열로 취급.
      vehicleGroups:(Array.isArray(d.vehicleGroups)&&d.vehicleGroups.length)
        ? d.vehicleGroups
        : [{id:'vg1',label:'기본',periods:d.vehiclePeriods||{}}],
      vehicleNotes:Array.isArray(d.vehicleNotes)?d.vehicleNotes:[],
      transfers:Array.isArray(d.transfers)?d.transfers:[]
    };
      // 저장된 골프장(새 구조)이 있으면 반영
      if(d.regions){ const fs=Object.values(d.regions)[0]?.courses?.[0]?.seasons?.[0];
        if(fs && fs.gf18!==undefined){
          const conv={}, hot={};
          Object.entries(d.regions).forEach(([reg,rv])=>{
            conv[reg]=(rv.courses||[]).map(c=>({ n:c.name, note:c.note||'', s:(c.seasons||[]).map(s=>({ from:s.from, to:s.to, g18:[s.gf18?.wd??null,s.gf18?.we??null], cad:s.caddie||0, crt:s.cart||0, g9:(s.gf9&&(s.gf9.wd!=null||s.gf9.we!=null))?[s.gf9.wd??null,s.gf9.we??null]:null, cad9:s.caddie9||0, crt9:s.cart9||0 })) }));
            if(rv.hotels&&rv.hotels.length) hot[reg]=rv.hotels;
          });
          Object.keys(COURSES).forEach(k=>delete COURSES[k]); Object.assign(COURSES,conv);
          if(Object.keys(hot).length) P.hotels=hot;
        }
      }
    }
  }catch(e){}
}
// 지역 목록은 관리자 코드관리('지역')에서 가져온다 — 관리자가 추가/수정/삭제하면 여기 바로 반영
async function loadRegionCodes(){
  try{
    const {data:row,error}=await sb.from('guide_data').select('data').eq('data_key','golf_codes').maybeSingle();
    if(!error&&row&&row.data&&Array.isArray(row.data.region)){
      const l=row.data.region.filter(r=>r.active!==false).map(r=>r.label).filter(Boolean);
      if(l.length){ REGIONS=l; return; }
    }
  }catch(e){}
  REGIONS=REGION_FALLBACK.slice();
}
function startApp(user){
  if(user&&isAdmin(user)) document.getElementById('adminLink').style.display='';
  const d0=new Date(); d0.setDate(d0.getDate()+14); $('#startDate').value=iso(d0);
  buildTripOptions();
  window._ready=true;
  refreshAll();
  $('#golfLogin').style.display='none'; $('#golfApp').style.display='block';
}
async function resolveEmail(typed){ try{ const {data:row}=await sb.from('guide_data').select('data').eq('data_key','login_directory').single(); if(row&&row.data){const k=(typed||'').toLowerCase(); if(row.data[k])return row.data[k];} }catch(e){} return null; }
async function gLogin(){ const id=($('#glid').value||'').trim(),pw=($('#glpw').value||'').trim(),err=$('#gerr'),btn=$('#gbtn'); err.textContent=''; if(!id||!pw){err.textContent='아이디·비밀번호를 입력하세요.';return;} btn.textContent='로그인 중...';btn.disabled=true;
  try{ const email=await resolveEmail(id); if(email){ const {data,error}=await sb.auth.signInWithPassword({email,password:pw}); if(!error&&data&&data.session){ await loadPricing(); await loadRegionCodes(); startApp(data.user); return; } } err.textContent='아이디 또는 비밀번호가 올바르지 않습니다.'; }catch(e){ err.textContent='로그인 중 오류.'; }finally{ btn.textContent='로그인';btn.disabled=false; } }
async function doLogout(){ try{await sb.auth.signOut();}catch(e){} location.reload(); }
(async function boot(){ try{ const {data:{session}}=await sb.auth.getSession(); if(session&&session.user){ await loadPricing(); await loadRegionCodes(); startApp(session.user); return; } }catch(e){} $('#golfLogin').style.display='flex'; const f=$('#glid'); if(f)f.focus(); })();
</script>
