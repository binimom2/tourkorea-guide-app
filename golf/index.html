<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>골프 견적</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--fairway:#123A2B;--fairway-deep:#0B231A;--sand:#E9DFC8;--paper:#F7F3E9;--marigold:#E8A33D;--ink:#15211C;--line:rgba(18,58,43,.18);--muted:#5E6F66;--danger:#c0492f;--font:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;--num:"JetBrains Mono",ui-monospace,monospace;}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.5}
/* 3박4일(4줄) 일정이 스크롤 없이 한 화면에 들어오도록 전체 밀도를 높였다 */
.wrap{max-width:1040px;margin:0 auto;padding:11px 14px 16px}
.head{border-bottom:2px solid var(--fairway);padding-bottom:6px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
.head .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.eyebrow{font-size:10px;letter-spacing:.2em;color:var(--muted);font-weight:600}
.head h1{margin:1px 0 0;font-size:clamp(18px,2.6vw,22px);font-weight:800;letter-spacing:-.03em}
.head a,.head button.link{background:none;border:1px solid var(--line);border-radius:999px;padding:4px 10px;font:inherit;font-size:11.5px;font-weight:700;color:var(--fairway);text-decoration:none;cursor:pointer}
.who{font-size:11.5px;font-weight:700;color:var(--muted);white-space:nowrap}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px 10px;margin-bottom:7px}
.card h2{margin:0 0 6px;font-size:13.5px;font-weight:800}
.grid{display:grid;gap:8px}
@media(min-width:640px){.grid.g4{grid-template-columns:repeat(4,1fr)}.grid.g2{grid-template-columns:1fr 1fr}.grid.g3{grid-template-columns:repeat(3,1fr)}}
.f{display:flex;flex-direction:column;gap:3px}
.f label{font-size:11px;font-weight:700;color:var(--muted)}
.f input,.f select{font:inherit;font-size:13px;padding:6px 9px;border:1px solid var(--line);border-radius:7px;background:var(--paper);color:var(--ink)}
.f input:focus,.f select:focus{outline:2px solid var(--marigold);outline-offset:1px;background:#fff}
/* 기본 정보는 가장 자주 만지는 칸이라 크게. 대신 날짜·인원·박수는 좁혀서
   팀명이 남는 폭을 다 쓰게 하고, 5칸이 한 줄에 여유 있게 들어가도록 했다. */
#startDate,#pax,#nights,#daysOut,#teamName{font-size:15px;padding:10px 11px}
.basic{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.fx-date{flex:0 0 156px}
.fx-team{flex:1 1 180px;max-width:290px}
.fx-pax,.fx-stay{flex:0 0 auto}
/* 명·박·일 세 칸은 같은 너비로 */
.fx-pax .unit input,.fx-stay .unit input{flex:0 0 66px}
/* 숫자칸 옆 단위(명·박·일) — 무엇을 적는 칸인지 바로 보이게 */
.unit{display:flex;align-items:center;gap:6px}
.unit input{flex:1;min-width:0;text-align:right}
.unit span{font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap}
/* 다 채운 칸은 한 줄로 접힌다 — 화면이 넘치지 않게. 다시 만지면 펴진다. */
.step .steph{display:flex;align-items:center;gap:8px}
.sublab{font-weight:400;font-size:11.5px;color:var(--muted);white-space:nowrap}
.csum{flex:1;min-width:0;font-size:12.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity .18s ease}
.step.folded .csum{opacity:1}
.cedit{display:none;font-size:11.5px;font-weight:700;color:var(--fairway);border:1px solid var(--line);border-radius:999px;padding:4px 11px;cursor:pointer;white-space:nowrap}
.step.folded .cedit{display:inline-block}
.step .cbody{overflow:hidden;max-height:1400px;opacity:1;transition:max-height .26s ease,opacity .18s ease}
.step.folded .cbody{max-height:0;opacity:0;pointer-events:none}
/* 접힌 줄도 손으로 누르기 좋게 조금 넉넉히 */
.step.folded{padding:14px 13px}
.step.folded h2{margin-bottom:0}
@media(prefers-reduced-motion:reduce){.step .cbody,.csum{transition:none}}
/* 차량·가이드는 한 줄에 나란히 */
.row2{display:grid;gap:7px;margin-bottom:7px}
.row2 .card{margin-bottom:0}
@media(min-width:640px){.row2{grid-template-columns:1fr 1fr}}
/* 견적번호 — 견적서를 뽑으면 부여된다 */
.qno{font-size:10.5px;font-weight:800;color:#3a2400;background:var(--marigold);border-radius:5px;padding:2px 7px;letter-spacing:.02em}
.qno:empty{display:none}
/* 숙소 한 줄 = 지역 · 호텔 · 박수 · 룸타입 · 실수 */
.hrow{display:flex;flex-wrap:wrap;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:var(--paper)}
.hrow .hreg{font-weight:700;font-size:15px;min-width:70px;white-space:nowrap}
.hrow select{font:inherit;font-size:15px;padding:10px 11px;border:1px solid var(--line);border-radius:7px;background:#fff}
.hrow .hsel{flex:1;min-width:190px}
.hrow input{width:64px;font:inherit;font-size:15px;text-align:right;padding:10px 9px;border:1px solid var(--line);border-radius:7px;background:#fff}
.hrow small{font-weight:600;color:var(--muted);font-size:13px}
.hrow .hrooms{font-size:14px;font-weight:800;color:var(--fairway);white-space:nowrap;min-width:40px;text-align:right}
/* 일수는 박수+1로 자동 — 직접 못 고친다 */
#daysOut{background:rgba(18,58,43,.06);color:var(--muted);cursor:default}
/* 오전 출발 / 오전 출국 체크 */
.opts{display:flex;flex-wrap:wrap;gap:18px;margin-top:10px}
.amdep{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap;cursor:pointer;padding:0 2px}
.amdep input{width:16px;height:16px;cursor:pointer}
/* '숙소도 원하시나요?'처럼 체크해야 칸이 열리는 섹션 제목 */
.askh{display:flex;align-items:center;gap:7px}
.askh input{width:17px;height:17px;cursor:pointer;margin:0}
.askh label{cursor:pointer}
/* 견적 결과: 1인 요금 × 인원수 = 총액 */
.sum-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:9px 2px}
.sum-k{font-size:13px;opacity:.85}
.sum-v{font-size:19px;font-weight:800;letter-spacing:.2px}
.sum-v em{font-style:normal;font-size:12px;font-weight:700;opacity:.7;margin-left:2px}
.sum-mul{border-top:1px dashed rgba(18,58,43,.25)}
.sum-mul .sum-v{font-size:15px}
.sum-total{border-top:2px solid var(--marigold);margin-top:4px;padding-top:12px}
.sum-total .sum-k{font-size:15px;font-weight:800;opacity:1}
.sum-total .sum-v{font-size:26px;color:var(--fairway)}
.sum-empty{opacity:.6;padding:10px 2px;font-size:13px}
.sum-warn{margin-top:10px;font-size:12.5px;font-weight:700;color:#a8410f}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px}
/* 지역 선택 — 가는 순서대로 클릭, 고른 것만 아래에 펼쳐 박수 입력 */
.chips{display:flex;flex-wrap:wrap;gap:8px;padding-top:3px}
.chip{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:9px 17px;font:inherit;font-size:15px;font-weight:700;color:var(--fairway);cursor:pointer}
.chip:hover{border-color:var(--fairway)}
.chip.on{background:var(--fairway);color:var(--sand);border-color:var(--fairway)}
.chip .seq{width:19px;height:19px;border-radius:50%;background:var(--marigold);color:#3a2400;font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.picked{display:flex;flex-wrap:wrap;gap:9px;margin-top:9px}
.picked:empty{display:none}
.pick{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;font-size:15px;font-weight:700;color:var(--fairway)}
.pick .seq{width:20px;height:20px;border-radius:50%;background:var(--fairway);color:var(--sand);font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.pick input{width:64px;font:inherit;font-size:15px;text-align:right;padding:9px 9px;border:1px solid var(--line);border-radius:7px;background:var(--paper)}
.pick .x{color:var(--danger);cursor:pointer;font-weight:800;padding-left:2px;font-size:15px}
.pick small{font-weight:600;color:var(--muted);font-size:13px}
/* 날짜별 라운딩 — 한 줄에 한 날짜(날짜·요일·구분을 한 줄로 붙여 높이를 줄임) */
.day{display:flex;flex-wrap:wrap;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:var(--paper)}
.day .dlabel{font-weight:700;font-size:15px;min-width:172px;display:flex;align-items:center;gap:7px;white-space:nowrap}
.day .dlabel small{font-weight:600;font-size:12px;color:var(--muted)}
.day .rchk{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;white-space:nowrap}
.day .rchk input{width:17px;height:17px;cursor:pointer}
.day select{font:inherit;font-size:15px;padding:10px 11px;border:1px solid var(--line);border-radius:7px;background:#fff}
.day .reg{width:96px}.day .course{flex:1;min-width:180px}.day .holes{width:96px}
.day.off{opacity:.55}
.badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--sand);color:var(--fairway)}
.badge.we{background:#f6dcae;color:#7a4a00}
/* 결과 — 옅은 그린 바탕이라 글자·선은 진한 색으로 둔다 */
.card.res{background:#E4EEE5;color:var(--ink);border:1px solid rgba(18,58,43,.22)}
.card.res h2{color:var(--fairway)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
.res th,.res td{padding:3.5px 4px;text-align:left}
.res thead th{font-size:10px;letter-spacing:.14em;opacity:.6;font-weight:600}
.res tbody tr{border-top:1px solid rgba(18,58,43,.14)}
.res td.n{text-align:right;font-family:var(--num);white-space:nowrap}
.res td .sub{display:block;font-size:11px;opacity:.6;margin-top:1px}
.res tfoot td{border-top:2px solid var(--marigold);padding-top:9px;font-weight:800;font-size:17px}
.res tfoot td.n{font-size:21px;color:var(--fairway)}
.perp{padding-top:7px;font-size:12.5px;opacity:.8}
/* 견적서 내려받기 버튼 */
.dlrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid rgba(18,58,43,.18)}
.dlbtn{font:inherit;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:8px;border:1px solid var(--fairway);background:var(--fairway);color:var(--sand);cursor:pointer}
.dlbtn.ghost{background:transparent;color:var(--fairway);border-color:rgba(18,58,43,.3)}
.dlbtn:disabled{opacity:.55;cursor:default}
.warn{color:#a8410f}
/* 로그인 */
#golfLogin{position:fixed;inset:0;background:var(--fairway-deep);display:none;align-items:center;justify-content:center;z-index:50}
#golfLogin .box{background:#fff;border-radius:18px;padding:30px 26px;width:340px;max-width:90vw}
#golfLogin h1{margin:0 0 4px;font-size:20px;font-weight:800;color:var(--fairway)}
#golfLogin p{margin:0 0 16px;font-size:12.5px;color:var(--muted)}
#golfLogin label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:12px 0 5px}
#golfLogin input{width:100%;font:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:var(--paper)}
#golfLogin button{width:100%;margin-top:18px;font:inherit;font-weight:700;font-size:15px;padding:12px;border:0;border-radius:9px;background:var(--fairway);color:var(--sand);cursor:pointer}
</style>
</head>
<body>
<div id="golfLogin"><div class="box">
  <h1>⛳ 골프 견적</h1><p>기존 앱과 동일한 계정으로 로그인</p>
  <label>아이디</label><input id="glid" autocomplete="off" onkeydown="if(event.key==='Enter')gLogin()">
  <label>비밀번호</label><input id="glpw" type="password" autocomplete="off" onkeydown="if(event.key==='Enter')gLogin()">
  <button id="gbtn" onclick="gLogin()">로그인</button>
  <div id="gerr" style="color:#c0492f;font-size:12.5px;margin-top:10px;min-height:16px"></div>
</div></div>

<div class="wrap" id="golfApp" style="display:none">
  <header class="head">
    <div>
      <div class="eyebrow">THAILAND GOLF</div>
      <h1>골프 견적 내기</h1>
    </div>
    <div class="top">
      <span class="who" id="whoBadge"></span>
      <a href="/golf/admin/" id="adminLink" style="display:none;background:var(--fairway);color:var(--sand)">🔧 코드·요금 관리</a>
      <a href="/travel/">← 예약관리</a>
      <button class="link" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="card step" id="s1">
    <h2 class="steph">1. 기본 정보<span class="qno" id="qnoTag"></span><span class="csum" id="sum1"></span><span class="cedit">수정</span></h2>
    <div class="cbody">
      <!-- 날짜·인원·박수는 좁게, 팀명은 남는 폭을 다 쓰게 -->
      <div class="basic">
        <div class="f fx-date"><label>며칠에 출발하시나요?</label><input type="date" id="startDate"></div>
        <div class="f fx-team"><label>팀명</label><input type="text" id="teamName" autocomplete="off" placeholder="예: 홍길동 팀"></div>
        <div class="f fx-pax"><label>몇 명인가요?</label>
          <div class="unit"><input type="number" id="pax" min="1" value="4"><span>명</span></div>
        </div>
        <!-- 박수만 적으면 일수는 자동(박수+1). 빈 칸은 0을 미리 넣지 않는다 — 숫자를 찍을 때 밀린다 -->
        <div class="f fx-stay"><label>며칠간 머무르시나요?</label>
          <div class="unit">
            <input type="number" id="nights" min="0" max="14" inputmode="numeric"><span>박</span>
            <input type="text" id="daysOut" readonly tabindex="-1"><span>일</span>
          </div>
        </div>
      </div>
      <div class="opts">
        <label class="amdep" title="한국에서 오전에 출발하면 첫날부터 라운딩·차량·가이드를 온종일 씁니다">
          <input type="checkbox" id="amDep"> 한국에서 오전 출발
        </label>
        <label class="amdep" title="태국에서 오전에 출국하면 마지막 날은 라운딩을 할 수 없습니다">
          <input type="checkbox" id="amRet"> 태국에서 오전 출국
        </label>
      </div>
    </div>
  </div>

  <div class="card step" id="s2">
    <h2 class="steph">2. 머무르실 곳 <span class="sublab">가시는 순서대로 클릭하세요</span><span class="csum" id="sum2"></span><span class="cedit">수정</span></h2>
    <div class="cbody">
      <div class="chips" id="regChips"></div>
      <div class="picked" id="regPicked"></div>
      <div class="hint" id="paxInfo"></div>
    </div>
  </div>

  <div class="card step" id="s3">
    <h2 class="steph askh"><input type="checkbox" id="useHotel"><label for="useHotel">3. 숙소도 원하시나요?</label><span class="csum" id="sum3"></span><span class="cedit">수정</span></h2>
    <div class="cbody">
      <div id="hotelWrap" style="display:none"></div>
      <div class="hint" id="hotelHint" style="display:none"></div>
    </div>
  </div>

  <div class="card step" id="s4">
    <h2 class="steph">4. 라운딩하실 날만 선택 후 골프장을 고르세요 <span class="sublab">그린피+캐디+전동카 포함</span><span class="csum" id="sum4"></span><span class="cedit">수정</span></h2>
    <div class="cbody"><div id="days"></div></div>
  </div>

  <div class="row2">
    <div class="card step" id="s5">
      <h2 class="steph">5. 차량<span class="csum" id="sum5"></span><span class="cedit">수정</span></h2>
      <!-- 차량은 기본 포함. 필요 없을 때만 빼도록 체크를 둔다(대부분 쓰기 때문). -->
      <div class="cbody">
        <div class="f"><label>차량 요금 기준</label><select id="vehGroup"></select></div>
        <label for="noVeh" style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="noVeh"> 차량이 필요 없습니다
        </label>
      </div>
    </div>

    <div class="card step" id="s6">
      <h2 class="steph askh"><input type="checkbox" id="useGuide"><label for="useGuide">6. 가이드 원하시나요?</label><span class="csum" id="sum6"></span><span class="cedit">수정</span></h2>
      <!-- 선택지는 buildGuideOptions()가 관리자 요금표의 가이드 종류로 채운다 -->
      <div class="cbody">
        <div class="f" id="guideWrap" style="display:none"><label>가이드 종류</label><select id="guide"></select></div>
      </div>
    </div>
  </div>

  <section class="card res">
    <h2>견적 결과</h2>
    <!-- 상세 내역 없이 «1인 요금 × 인원수 = 총액»만 보여준다 -->
    <div id="sumBox"></div>
    <div class="perp" id="perp"></div>
    <div class="dlrow">
      <button type="button" class="dlbtn" id="dlCustomer" onclick="downloadQuote('customer')">📷 손님용 견적서</button>
      <button type="button" class="dlbtn ghost" id="dlInternal" onclick="downloadQuote('internal')">📷 내부용 견적서</button>
      <button type="button" class="dlbtn ghost" id="dlHistory" onclick="openQuoteHistory()">🗂 견적 이력</button>
    </div>
  </section>
  <!-- 견적서 그림을 뜨기 위한 자리. 화면 밖에 두고 캡처만 한다. -->
  <div id="quoteHost" aria-hidden="true" style="position:absolute;left:-10000px;top:0;"></div>

  <!-- 견적 이력: 보관된 견적을 그때 금액 그대로 다시 뽑는다 -->
  <div id="qhModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px;">
    <div style="background:#fff;border-radius:14px;width:100%;max-width:620px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.25);">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#123A2B;color:#fff;">
        <b style="font-size:14px;">🗂 견적 이력</b>
        <button type="button" onclick="document.getElementById('qhModal').style.display='none'"
                style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;">✕ 닫기</button>
      </div>
      <div id="qhBody" style="overflow:auto;"></div>
    </div>
  </div>
  <div class="hint" id="vehNotes"></div>

/* 오전 출발(full=true)이면 첫날부터 온종일 쓰므로 '풀' 요금표를 쓴다.
   밤 비행기면 첫날은 이동뿐이라 일반 요금표를 쓴다.
   '풀' 요금이 입력돼 있지 않으면 일반 요금으로 되돌아간다(견적이 비지 않게). */
function tierValue(obj, N, key, full){
  const NORMAL=[['1일',0],['1박2일',1],['2박3일',2],['3박4일',3]];
  const FULL  =[['풀1박2일',1],['풀2박3일',2],['풀3박4일',3]];
  const pick=order=>{
    const oneMore=((obj||{})['1박추가시']||{})[key]||0;
    let base=null, bn=0;
    order.forEach(([nm,pn])=>{ const v=((obj||{})[nm]||{})[key]; if(v!=null&&v>0&&pn<=N){ base=v; bn=pn; } });
    if(base===null){ for(const [nm,pn] of order){ const v=((obj||{})[nm]||{})[key]; if(v!=null&&v>0){ base=v; bn=pn; break; } } }
    if(base===null) return null;
    return { value: base + oneMore*Math.max(0,N-bn), base, bn, oneMore, extra:Math.max(0,N-bn) };
  };
  return full ? (pick(FULL)||pick(NORMAL)) : pick(NORMAL);
}

/* 총 박수. 지역을 고르기 전에도 적을 수 있어야 해서 따로 들고 있다가,
   첫 지역을 고르는 순간 그 지역 박수로 넘겨준다(예전엔 지역이 없으면 일정이 안 바뀌었다). */
let tripNights=0;
function totalNights(){ return ROUTE.length?ROUTE.reduce((a,r)=>a+(+r.nights||0),0):tripNights; }
// 숫자칸에 0을 미리 넣지 않는다 — 0이 남아 있으면 숫자를 찍을 때 앞뒤로 밀린다
function numval(n){ return (+n>0)?String(+n):''; }
function syncTripInput(){
  if(ROUTE.length) tripNights=ROUTE.reduce((a,r)=>a+(+r.nights||0),0);
  const n=totalNights();
  const el=$('#nights');
  if(el&&document.activeElement!==el) el.value=numval(n);   // 입력 중이면 건드리지 않는다
  const d=$('#daysOut'); if(d) d.value=n>0?String(n+1):'';
}
// 박수를 직접 고치면 뒤쪽 지역 박수를 늘리거나(추가) 뒤에서부터 깎아서(감소) 합을 맞춘다
function applyTripToRoute(n){
  tripNights=n;
  if(!ROUTE.length) return;
  let d=n-totalNights();
  if(d>0){ const last=ROUTE[ROUTE.length-1]; last.nights=(+last.nights||0)+d; return; }
  for(let i=ROUTE.length-1;i>=0&&d<0;i--){
    const take=Math.min(+ROUTE[i].nights||0,-d);
    ROUTE[i].nights=(+ROUTE[i].nights||0)-take; d+=take;
  }
}
function toggleRegion(name){
  const i=ROUTE.findIndex(r=>r.region===name);
  if(i>=0){ ROUTE.splice(i,1); delete hotelPick[name]; delete hotelNights[name]; delete hotelRoom[name]; }
  // 첫 지역이면 위에 적어둔 총 박수를 그대로 준다. 두 번째부터는 0박으로 두고 직접 나눠 적는다.
  else ROUTE.push({region:name,nights:ROUTE.length?0:tripNights});
  refreshAll();
}

/* 손님에게 보여줄 차량명. 요금기준 라벨에는 «(노출금지--방파)» 같은 내부 메모가 섞여 있어
   그대로 쓰면 견적서로 새어나간다. 관리에서 표시명(name)을 따로 넣으면 그것을 쓰고,
   없으면 라벨에서 내부 메모를 떼어낸 앞부분을 쓴다. */
function vehName(g){
  if(!g) return '차량';
  if(g.name) return String(g.name).trim();
  let s=String(g.label||'').trim();
  s=s.replace(/\s*\([^()]*노출\s*금지[^()]*\)\s*/g,' ');  // (노출금지--방파) 통째로
  s=s.split('--')[0];                                      // 남은 '--메모' 꼬리
  s=s.replace(/\s{2,}/g,' ').trim();
  return s||'차량';
}
const LOCK_FIRST='한국에서 오전 출발을 체크하면 1일차도 라운딩할 수 있습니다';
const LOCK_LAST='태국에서 오전 출국이면 마지막 날은 라운딩할 수 없습니다';
/* 라운딩을 못 하는 날인지 — 1일차는 밤 비행기면 못 하고(오전 출발 체크 시 열림),
   마지막 날은 오전에 출국하면 못 한다(당일치기는 1일차 규칙만 본다). */
function dayLocked(i,days){
  if(i===0&&!amDepOn()) return LOCK_FIRST;
  if(days>1&&i===days-1&&amRetOn()) return LOCK_LAST;
  return '';
}
/* 라운딩은 «그 전날 밤 묵은 지역»에서 한다.
   방콕 1박 + 파타야 2박이면 2일차(출발일+1) 아침엔 아직 방콕이므로 방콕 골프장이다.
   (예전에는 지역이 하루 먼저 넘어가 2일차가 파타야로 잡혔다) */
function regionForDay(i){
  if(!ROUTE.length) return '';
  const nights=[];
  ROUTE.forEach(r=>{ for(let k=0;k<(+r.nights||0);k++) nights.push(r.region); });
  if(!nights.length) return ROUTE[0].region;          // 당일 일정
  const idx=Math.min(Math.max(i-1,0), nights.length-1);
  return nights[idx];
}
function regionOptionsHtml(sel){
  const opts=REGIONS.slice(); if(sel&&!opts.includes(sel)) opts.push(sel);
  return opts.map(r=>`<option${r===sel?' selected':''}>${r}</option>`).join('');
}
function buildDays(){
  const wrap=$('#days'); wrap.innerHTML=''; dayState=[];
  if(!ROUTE.length){ wrap.innerHTML='<div class="hint">위에서 지역을 먼저 선택하세요.</div>'; return; }
  const start=$('#startDate').value;
  if(!start){ wrap.innerHTML='<div class="hint">출발 일자를 먼저 선택하세요.</div>'; return; }
  const days=totalNights()+1;
  for(let i=0;i<days;i++){
    const d=new Date(start+'T00:00:00'); d.setDate(d.getDate()+i); const ds=iso(d);
    const we=isWeekend(d)||isHoliday(ds);
    const region=regionForDay(i);
    const st={date:ds, region, round:false, course:'', holes:'18'};
    const st_i=dayState.push(st)-1;
    const lock=dayLocked(i,days);
    const row=document.createElement('div'); row.className='day off'; row.dataset.i=st_i;
    row.innerHTML=`
      <div class="dlabel">${ds.slice(5).replace('-','/')} <small>${['일','월','화','수','목','금','토'][d.getDay()]}요일 ${we?'<span class="badge we">주말/휴일</span>':'<span class="badge">주중</span>'}</small></div>
      <label class="rchk" ${lock?`style="opacity:.45" title="${lock}"`:''}><input type="checkbox" data-r="${st_i}"${lock?' disabled':''}> 라운딩</label>
      <select class="reg" data-reg="${st_i}">${regionOptionsHtml(region)}</select>
      <select class="course" data-c="${st_i}" disabled></select>
      <select class="holes" data-h="${st_i}" disabled></select>`;
    wrap.appendChild(row);
    fillCourses(st_i);
  }
}
/* 체크박스를 켜고 끌 때 해당 날짜의 라운딩 칸만 열고 닫는다.
   buildDays로 다시 그리면 다른 날에 체크해 둔 라운딩이 날아간다. */
function setDayLock(i,msg){
  const c=document.querySelector(`[data-r="${i}"]`); if(!c) return;
  c.disabled=!!msg;
  const lb=c.closest('.rchk');
  if(lb){ lb.style.opacity=msg?'.45':''; lb.title=msg||''; }
  if(msg&&c.checked){                       // 잠기면 그날 라운딩은 해제
    c.checked=false; if(dayState[i]) dayState[i].round=false;
    const row=c.closest('.day'); if(row) row.classList.add('off');
    const cs=document.querySelector(`[data-c="${i}"]`), hs=document.querySelector(`[data-h="${i}"]`);
    if(cs) cs.disabled=true; if(hs) hs.disabled=true;
  }
}
function refreshDayLocks(){
  const days=dayState.length; if(!days) return;
  for(let i=0;i<days;i++){
    const msg=dayLocked(i,days);
    if(i===0||i===days-1) setDayLock(i,msg);   // 잠금 대상은 첫날·마지막날뿐
  }
}
function fillCourses(i){
  const st=dayState[i];
  const sel=document.querySelector(`[data-c="${i}"]`);
  const list=(COURSES[st.region]||[]).slice().sort(ganada);
  sel.innerHTML='<option value="">골프장 선택</option>'+list.map(c=>`<option value="${c.n}">${c.n}</option>`).join('');
  sel.value=st.course||'';
  fillHoles(i);
}
function fillHoles(i){
  const st=dayState[i];
  const sel=document.querySelector(`[data-h="${i}"]`);
  const c=(COURSES[st.region]||[]).find(x=>x.n===st.course);
  let opts=['<option value="18">18홀</option>'];
  if(c){ const has9=(c.s||[]).some(s=>s.g9); if(has9){ opts.push('<option value="27">27홀</option>'); opts.push('<option value="9">9홀</option>'); } }
  sel.innerHTML=opts.join(''); sel.value=st.holes||'18';
}
// 차량 요금 기준(지역 조합) · 안내문구 — 수송밴은 화면에서 뺐다(차량 요금 안으로 넣을 예정)
function renderVehicleUI(){
  const sel=$('#vehGroup');
  const groups=P.vehicleGroups||[];
  const cur=sel.value;
  sel.innerHTML=groups.map((g,i)=>`<option value="${i}">${g.label||'조합'+(i+1)}</option>`).join('')
    || '<option value="">등록된 차량요금 없음</option>';
  if(cur && groups[+cur]) sel.value=cur;
  const nt=$('#vehNotes');
  const notes=(P.vehicleNotes||[]).filter(Boolean);
  nt.innerHTML=notes.length?notes.map(t=>'※ '+t).join('<br>'):'';
  nt.style.display=notes.length?'':'none';
}
/* 숙소 — 룸타입에 따라 실수가 달라진다. 4명이면 트윈은 2실이지만 싱글은 4실이다. */
const ROOM_TYPES=[['twin','트윈 (2인 1실)'],['single','싱글 (1인 1실)'],['triple','트리플 (3인 1실)']];
const ROOM_SHORT={twin:'트윈',single:'싱글',triple:'트리플'};
function roomCount(pax,rt){ return rt==='single'?pax:(rt==='triple'?Math.ceil(pax/3):Math.ceil(pax/2)); }
// 박수는 지역 박수를 그대로 쓰되, 손으로 고쳤으면 고친 값을 쓴다
function hotelNightsOf(r){
  const v=hotelNights[r.region];
  return (v===undefined||v==='')?(+r.nights||0):Math.max(0,+v||0);
}
// 숙소는 「숙소도 원하시나요?」를 체크했을 때, 고른 지역 중 1박 이상인 곳만 칸을 만든다
function renderHotels(){
  const H=P.hotels||{};
  const wrap=$('#hotelWrap'), hint=$('#hotelHint');
  wrap.innerHTML='';
  const on=useHotelOn();
  wrap.style.display=on?'':'none';
  const stay=ROUTE.filter(r=>(+r.nights||0)>0);
  if(hint){
    const msg=(on&&!stay.length)?'2번에서 머무르실 곳과 박수를 먼저 적어주세요.':'';
    hint.textContent=msg; hint.style.display=msg?'':'none';
  }
  if(!on) return;
  const pax=Math.max(1,+$('#pax').value||1);
  stay.forEach(r=>{
    const list=H[r.region]||[];
    const rt=hotelRoom[r.region]||'twin';
    const row=document.createElement('div'); row.className='hrow';
    const opts=list.map((h,idx)=>`<option value="${idx}"${String(hotelPick[r.region])===String(idx)?' selected':''}>${h.name} · ${won(h.perNight)} THB/박</option>`).join('');
    row.innerHTML=`<span class="hreg">${r.region}</span>`+
      `<select class="hsel" data-hotel="${r.region}"><option value="">${list.length?'숙소 없이':'등록된 숙소 없음'}</option>${opts}</select>`+
      `<input type="number" min="0" max="14" value="${numval(hotelNightsOf(r))}" data-hn="${r.region}"><small>박</small>`+
      `<select data-hroom="${r.region}">${ROOM_TYPES.map(([v,l])=>`<option value="${v}"${v===rt?' selected':''}>${l}</option>`).join('')}</select>`+
      `<span class="hrooms" data-hrooms="${r.region}">${roomCount(pax,rt)}실</span>`;
    wrap.appendChild(row);
  });
}
// 인원수·룸타입이 바뀌면 실수 표시만 다시 맞춘다(칸을 다시 그리면 입력 포커스가 날아간다)
function updateRoomTags(pax){
  document.querySelectorAll('[data-hrooms]').forEach(el=>{
    const reg=el.dataset.hrooms;
    el.textContent=roomCount(pax,hotelRoom[reg]||'twin')+'실';
  });
}

/* ── 계산 ── */
function calc(){
  if(!window._ready) return;
  const pax=Math.max(1,+$('#pax').value||1);
  const nights=totalNights();
  updateRoomTags(pax);
  renderStepSummaries();   // 접힌 칸에 보이는 한 줄 요약을 늘 최신으로
  $('#paxInfo').textContent=ROUTE.length
    ? `${pax}명 · ${ROUTE.map(r=>`${r.region} ${+r.nights||0}박`).join(' → ')} = 총 ${nights}박 ${nights+1}일`
    : `${pax}명 · 지역을 선택하세요`;
  const lines=[];
  // 1) 골프 (체크된 날)
  dayState.forEach(st=>{
    if(!st.round || !st.course) return;
    const c=(COURSES[st.region]||[]).find(x=>x.n===st.course); if(!c) return;
    const ss=seasonOf(c,st.date);
    const we=isWeekend(new Date(st.date+'T00:00:00'))||isHoliday(st.date);
    const wk=we?1:0;
    const nm=`${c.n} ${st.holes}홀`, dl=`${st.date.slice(5)} ${st.region}`;
    if(!ss){ lines.push({t:nm,s:`${dl} · 해당일 요금 미등록`,v:0,warn:1}); return; }
    let unit=null;
    if(st.holes==='18') unit = ss.g18[wk]!=null ? ss.g18[wk]+ss.cad+ss.crt : null;
    else if(st.holes==='27') unit = (ss.g18[wk]!=null&&ss.g9&&ss.g9[wk]!=null) ? ss.g18[wk]+ss.g9[wk]+ss.cad+ss.cad9+ss.crt+ss.crt9 : null;
    else if(st.holes==='9') unit = (ss.g9&&ss.g9[wk]!=null) ? ss.g9[wk]+ss.cad9+ss.crt9 : null;
    if(unit==null){ lines.push({t:nm,s:`${dl} · ${we?'주말':'주중'} 요금 미등록`,v:0,warn:1}); return; }
    lines.push({t:nm,s:`${dl} · ${we?'주말':'주중'} · ${won(unit)} × ${pax}명`,v:unit*pax});
  });
  // 2) 차량 (선택한 지역 조합의 기간값 + 1박추가 확장)
  const amDep=!!($('#amDep')&&$('#amDep').checked);   // 오전 출발 = 첫날부터 온종일
  if(useVehOn()){
    const vgIdx=+($('#vehGroup').value||0);
    const vGroup=(P.vehicleGroups||[])[vgIdx];
    const vt=tierValue((vGroup&&vGroup.periods)||{},nights,'amount',amDep);
    // 내부 화면·내부용 견적서에만 요금기준 라벨을 붙인다(라벨에 내부 메모가 섞여 있음)
    if(vt){ const vans=Math.ceil(pax/7); lines.push({t:`${vehName(vGroup)}${vGroup&&vGroup.label?' · '+vGroup.label:''}`,s:`${won(vt.value)}${vt.extra?` (기본 ${won(vt.base)} +1박추가 ${won(vt.oneMore)}×${vt.extra})`:''} × ${vans}대`,v:vt.value*vans}); }
    else lines.push({t:'차량',s:'요금 미입력 — 관리에서 입력 필요',v:0,warn:1});
  }
  // 3) 핸들링
  const ht=tierValue(P.handlingPeriods||{},nights,'amount');
  if(ht) lines.push({t:'핸들링 차지',s:`${won(ht.value)}${ht.extra?` (기본 ${won(ht.base)} +1박추가 ${won(ht.oneMore)}×${ht.extra})`:''} × ${pax}명`,v:ht.value*pax});
  else lines.push({t:'핸들링',s:'요금 미입력',v:0,warn:1});
  // 4) 가이드 (기간값 + 1박추가 확장 + 파타야 박당) — '가이드 원하시나요?'를 체크했을 때만
  const gt=useGuideOn()?$('#guide').value:'';
  if(gt){
    const G=(P.guidePeriods||{})[gt];
    const gv=G?tierValue(G,nights,'bkk',amDep):null;   // 가이드도 오전 출발이면 풀 요금
    if(gv){
      // 이름은 관리자에 등록된 종류를 그대로 쓴다(종류를 추가해도 견적서에 그 이름으로 나온다)
      lines.push({t:gt,s:`${won(gv.value)}${gv.extra?` (기본 ${won(gv.base)} +1박추가 ${won(gv.oneMore)}×${gv.extra})`:''}`,v:gv.value});
    } else lines.push({t:'가이드',s:'요금 미입력',v:0,warn:1});
  }
  // 5) 숙소 — '숙소도 원하시나요?'를 체크했을 때, 고른 지역별로. 실수는 룸타입에 따라 달라진다.
  const H=P.hotels||{};
  if(useHotelOn()) ROUTE.forEach(r=>{
    if(!(+r.nights||0)) return;
    const idx=hotelPick[r.region];
    if(idx===undefined||idx==='') return;
    const h=(H[r.region]||[])[+idx]; if(!h) return;
    const nn=hotelNightsOf(r); if(!nn) return;
    const rt=hotelRoom[r.region]||'twin';
    const rms=roomCount(pax,rt);
    lines.push({t:`숙소 · ${h.name}`,s:`${r.region} · ${ROOM_SHORT[rt]} ${rms}실 × ${nn}박 × ${won(h.perNight)}`,v:h.perNight*nn*rms});
  });
  const total=lines.reduce((a,b)=>a+b.v,0);
  const per=Math.round(total/pax);
  LAST={lines,total,per,pax,nights};   // 견적서 내려받기가 이 값을 그대로 쓴다
  const box=$('#sumBox');
  if(!lines.length){
    box.innerHTML='<div class="sum-empty">라운딩할 날을 체크하면 견적이 나옵니다.</div>';
    $('#perp').textContent='';
    return;
  }
  // 요금이 등록되지 않은 항목이 있으면 합계가 실제와 달라지므로 반드시 알린다
  const miss=lines.filter(l=>l.warn).map(l=>l.t);
  /* 이 화면은 손님에게 그대로 보여주는 면이라 밧을 적지 않는다 — 전부 원화다.
     한화는 «1인 요금을 천원 단위로 올린 값 × 인원수»가 총액이다. 총액을 환산해서
     올리면 1인 요금 × 인원수와 맞지 않아 손님이 직접 곱했을 때 어긋난다.
     환율(1밧당 원화)은 코드관리 '환율'에서 읽는다. 등록 전에는 어쩔 수 없이
     밧으로 보여주고 크게 경고한다 — 금액이 아예 안 보이면 상담을 못 하니까. */
  const perKrw=(FX_RATE>0)?krwUp(per*FX_RATE):0;
  const totKrw=perKrw*pax;
  const cur=perKrw?'원':'THB';
  box.innerHTML=
    `<div class="sum-row"><span class="sum-k">1인 요금</span><span class="sum-v">${won(perKrw||per)} <em>${cur}</em></span></div>`
    +`<div class="sum-row sum-mul"><span class="sum-k">인원수</span><span class="sum-v">× ${pax}명</span></div>`
    +`<div class="sum-row sum-total"><span class="sum-k">총액</span><span class="sum-v">${won(totKrw||total)} <em>${cur}</em></span></div>`
    +(miss.length?`<div class="sum-warn">⚠ 요금이 등록되지 않은 항목이 있습니다 — ${miss.join(', ')}</div>`:'')
    +(perKrw?'':`<div class="sum-warn">⚠ 환율이 등록되지 않아 밧으로 표시 중입니다 — 코드·요금 관리 &gt; 코드관리 &gt; 환율에 1밧당 원화를 등록하세요</div>`);
  $('#perp').textContent='';
}

/* ══════════════════════════ 견적서 그림 내려받기 ══════════════════════════ */
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
const WDAY=['일','월','화','수','목','금','토'];
function fmtDay(ds){ const d=new Date(ds+'T00:00:00'); return `${ds.slice(5).replace('-','/')} (${WDAY[d.getDay()]})`; }

/* 견적서에 적을 '포함 사항' — 실제로 담긴 항목만 손님 말로 바꿔 적는다.
   핸들링 차지는 손님용에 적지 않는다(금액에는 그대로 들어간다). */
function quoteIncludes(mode){
  const out=[];
  const rounds=dayState.filter(s=>s.round&&s.course).length;
  if(rounds) out.push(`골프 ${rounds}회 — 그린피 · 캐디피 · 전동카트 포함`);
  if(useVehOn()){
    const vg=(P.vehicleGroups||[])[+($('#vehGroup').value||0)];
    // 손님용에는 표시명만. 요금기준 라벨(내부 메모 포함)은 내부용에만 붙인다.
    out.push(`차량 ${vehName(vg)} — 전 일정 이용${(mode==='internal'&&vg&&vg.label)?` · [${vg.label}]`:''}`);
  }
  if(mode==='internal') out.push('핸들링 차지');
  if(useGuideOn()&&$('#guide').value) out.push(`가이드 · ${$('#guide').value}`);
  if(useHotelOn()){
    const pax=Math.max(1,+$('#pax').value||1);
    ROUTE.forEach(r=>{
      const idx=hotelPick[r.region];
      if(!(+r.nights||0)||idx===undefined||idx==='') return;
      const h=((P.hotels||{})[r.region]||[])[+idx]; if(!h) return;
      const rt=hotelRoom[r.region]||'twin';
      out.push(`숙소 · ${r.region} ${h.name} ${hotelNightsOf(r)}박 (${ROOM_SHORT[rt]} ${roomCount(pax,rt)}실)`);
    });
  }
  return out;
}
/* 견적번호 — 출발일자 + 순번. 예) 20260805-G001
   순번은 서버(guide_data / golf_quote_seq)에 모아 둬서 직원 여러 명이 같은 날짜로
   견적을 내도 겹치지 않게 한다. 서버를 못 쓰면 이 컴퓨터 기준으로 임시 번호를 준다. */
let QUOTE_NO='', QUOTE_NO_FOR='';
function showQuoteNo(){ const el=$('#qnoTag'); if(el) el.textContent=QUOTE_NO||''; }
async function nextQuoteSeq(date){
  try{
    const {data:row}=await sb.from('guide_data').select('data').eq('data_key','golf_quote_seq').maybeSingle();
    const map=(row&&row.data&&typeof row.data==='object'&&!Array.isArray(row.data))?row.data:{};
    const next=(+map[date]||0)+1;
    map[date]=next;   // 읽어온 내용 위에 이 날짜만 더한다(남의 번호를 지우지 않게)
    const {error}=await sb.from('guide_data').upsert({data_key:'golf_quote_seq',data:map,updated_at:new Date().toISOString()});
    if(error) throw error;
    return next;
  }catch(e){
    const k='golf_quote_seq_local';
    let map={}; try{ map=JSON.parse(localStorage.getItem(k)||'{}'); }catch(_){}
    const next=(+map[date]||0)+1; map[date]=next;
    try{ localStorage.setItem(k,JSON.stringify(map)); }catch(_){}
    return next;
  }
}
async function ensureQuoteNo(){
  const date=($('#startDate').value||'').replace(/-/g,'');
  if(!date) return '';
  if(QUOTE_NO&&QUOTE_NO_FOR===date) return QUOTE_NO;   // 같은 출발일자면 번호를 다시 뽑지 않는다
  const seq=await nextQuoteSeq(date);
  QUOTE_NO=`${date}-G${String(seq).padStart(3,'0')}`; QUOTE_NO_FOR=date;
  showQuoteNo();
  return QUOTE_NO;
}
/* 견적서 한 장을 만든다. mode='customer'면 금액은 1인 요금·총액만,
   'internal'이면 항목별 금액까지 적는다. html2canvas가 그대로 찍으므로
   색은 변수 말고 실제 값으로 쓴다. */
/* 견적 한 건을 그 시점 그대로 얼려 담는다.
   요금표(P)·환율(FX_RATE)·공휴일은 나중에 바뀌므로, 다시 계산할 여지를 두지 않고
   화면에 찍힌 값(금액·주말여부·포함사항)을 결과째로 저장한다.
   저장본으로 견적서를 다시 뽑으면 그날 손님에게 준 것과 같은 금액이 나온다. */
function quoteSnapshot(){
  const start=$('#startDate').value;
  const n=LAST.nights;
  const end=(()=>{ const d=new Date(start+'T00:00:00'); d.setDate(d.getDate()+n); return iso(d); })();
  return {
    quoteNo: QUOTE_NO||'',
    issued: iso(new Date()),
    savedAt: new Date().toISOString(),
    start, end,
    team: ($('#teamName').value||'').trim(),
    pax: LAST.pax, nights: n,
    route: ROUTE.map(r=>`${r.region} ${+r.nights||0}박`).join(' → ')||'-',
    flight: [amDepOn()?'한국 오전 출발':'한국 야간 출발', amRetOn()?'태국 오전 출국':''].filter(Boolean).join(' · '),
    days: dayState.map(st=>({
      date:st.date, region:st.region||'', course:st.course||'', holes:st.holes||'', round:!!st.round,
      we: isWeekend(new Date(st.date+'T00:00:00'))||isHoliday(st.date)   // 공휴일표가 바뀌어도 그대로
    })),
    includes: { customer: quoteIncludes('customer'), internal: quoteIncludes('internal') },
    fx: FX_RATE||0,
    lines: (LAST.lines||[]).map(l=>({t:l.t,s:l.s,v:l.v,warn:l.warn?1:0})),
    total: LAST.total, per: LAST.per
  };
}

function buildQuoteHtml(mode, Q){
  Q = Q || quoteSnapshot();
  const start=Q.start, end=Q.end, team=Q.team;
  const n=Q.nights, pax=Q.pax;
  const route=Q.route, flight=Q.flight;
  const FX=Q.fx||0, QNO=Q.quoteNo||'';

  const days=(Q.days||[]).map(st=>{
    const we=st.we;
    const play=(st.round&&st.course)?`${esc(st.course)} <b>${esc(st.holes)}홀</b>`:'<span style="color:#9aa4a0">라운딩 없음</span>';
    return `<tr>
      <td style="padding:7px 8px;border-bottom:1px solid #e7e3d8;white-space:nowrap;font-weight:700">${fmtDay(st.date)}</td>
      <td style="padding:7px 8px;border-bottom:1px solid #e7e3d8;white-space:nowrap;color:#5E6F66">${we?'주말/휴일':'주중'}</td>
      <td style="padding:7px 8px;border-bottom:1px solid #e7e3d8;white-space:nowrap;color:#5E6F66">${esc(st.region)}</td>
      <td style="padding:7px 8px;border-bottom:1px solid #e7e3d8">${play}</td>
    </tr>`;
  }).join('');

  const detail=(mode!=='internal')?'':`
    <div style="margin-top:16px">
      <div style="font-size:12px;font-weight:800;color:#123A2B;margin-bottom:6px">항목별 금액 <span style="font-weight:600;color:#c0492f">· 내부 검토용</span></div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        ${(Q.lines||[]).map(l=>`<tr>
          <td style="padding:6px 8px;border-bottom:1px solid #e7e3d8">${esc(l.t)}${l.warn?' <span style="color:#c0492f;font-weight:700">⚠</span>':''}

        발행일 ${esc(Q.issued||iso(new Date()))}${mode==='internal'?'<br><b style="color:#c0492f">내부용 (손님 전달 금지)</b>':''}
      </div>

    <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:14px">

// html2canvas는 쓸 때만 불러온다(첫 화면이 느려지지 않게)
function loadCanvasLib(){
  if(window.html2canvas) return Promise.resolve();
  return new Promise((ok,ng)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=()=>ok(); s.onerror=()=>ng(new Error('lib'));
    document.head.appendChild(s);
  });
}
/* ── 견적 보관 (guide_data / golf_quotes) ──
   견적서를 뽑는 순간의 금액을 통째로 남긴다. 요금표를 나중에 고쳐도
   지난 견적은 그때 금액 그대로 다시 뽑을 수 있다. */
const QUOTES_KEY='golf_quotes';
const QUOTES_MAX=500;          // 한 행(JSON)에 담으므로 상한을 둔다. 넘으면 오래된 것부터 빠진다.

async function saveQuoteRecord(Q){
  if(!Q||!Q.quoteNo) return false;
  try{
    const {data:row}=await sb.from('guide_data').select('data').eq('data_key',QUOTES_KEY).maybeSingle();
    let list=(row&&Array.isArray(row.data))?row.data:[];
    list=list.filter(x=>x&&x.quoteNo!==Q.quoteNo);   // 같은 번호로 다시 뽑으면 최신본으로 교체
    list.unshift(Q);
    if(list.length>QUOTES_MAX) list=list.slice(0,QUOTES_MAX);
    const {error}=await sb.from('guide_data').upsert({data_key:QUOTES_KEY,data:list,updated_at:new Date().toISOString()});
    if(error) throw error;
    return true;
  }catch(e){ return false; }
}

async function loadQuoteRecords(){
  try{
    const {data:row}=await sb.from('guide_data').select('data').eq('data_key',QUOTES_KEY).maybeSingle();
    return (row&&Array.isArray(row.data))?row.data:[];
  }catch(e){ return null; }   // null = 불러오기 실패(빈 목록과 구분)
}

async function openQuoteHistory(){
  const box=$('#qhBody'); if(!box) return;

  if(!list.length){ box.innerHTML='<div style="padding:18px;color:#5E6F66">아직 보관된 견적이 없습니다.<br><span style="font-size:12px">견적서를 내려받으면 그때 금액이 자동으로 보관됩니다.</span></div>'; return; }
  QH_LIST=list;

/* 보관된 견적을 그때 금액 그대로 다시 PNG로 뽑는다. 계산을 다시 하지 않는다. */
async function reissueQuote(idx, mode){
  const Q=QH_LIST[idx]; if(!Q) return;
  if(mode!=='internal' && !(Q.fx>0)){ alert('이 견적은 환율이 없이 저장되어 손님용(원화)으로 다시 만들 수 없습니다.\n내부용으로 받아주세요.'); return; }
  const host=$('#quoteHost');
  try{
    await loadCanvasLib();
    host.innerHTML=buildQuoteHtml(mode, Q);
    const canvas=await html2canvas(host.firstElementChild,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const team=(Q.team||'').replace(/[\\/:*?"<>|]/g,'');
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download=`${Q.quoteNo}${team?'_'+team:''}_${Q.pax}명${mode==='internal'?'_내부용':''}.png`;
    document.body.appendChild(a); a.click(); a.remove();
  }catch(e){ alert('견적서를 다시 만들지 못했습니다. 인터넷 연결을 확인해 주세요.'); }
  finally{ host.innerHTML=''; }
}

async function downloadQuote(mode){
  if(!LAST||!LAST.lines.length){ alert('먼저 라운딩할 날을 체크해 주세요. 견적이 있어야 견적서를 만들 수 있습니다.'); return; }
  if(!$('#startDate').value){ alert('출발 일자를 먼저 골라주세요.'); return; }
  // 손님용은 금액이 전부 원화라, 환율이 없으면 만들 수 없다(0원짜리 견적서가 나가면 안 된다)
  if(mode!=='internal'&&!(FX_RATE>0)){
    alert('환율이 등록되어 있지 않아 손님용 견적서를 만들 수 없습니다.\n\n코드·요금 관리 > 코드관리 > 환율에 1밧당 원화(예: 46)를 등록해 주세요.');
    return;
  }
  const btn=$(mode==='internal'?'#dlInternal':'#dlCustomer');
  const label=btn?btn.textContent:'';
  if(btn){ btn.disabled=true; btn.textContent='만드는 중…'; }
  const host=$('#quoteHost');
  try{
    await ensureQuoteNo();          // 견적이 완성됐으니 번호를 부여한다
    await loadCanvasLib();
    // 이 시점의 금액을 얼려 담고, 견적서도 저장본에서 그린다(화면과 저장본이 어긋나지 않게)
    const Q=quoteSnapshot();
    host.innerHTML=buildQuoteHtml(mode, Q);
    const canvas=await html2canvas(host.firstElementChild,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const team=(Q.team||'').replace(/[\\/:*?"<>|]/g,'');
    const name=`${Q.quoteNo||'골프견적'}${team?'_'+team:''}_${Q.pax}명${mode==='internal'?'_내부용':''}.png`;
    const url=canvas.toDataURL('image/png');
    const a=document.createElement('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    // 보관 실패해도 견적서는 이미 내려받았으므로 알리기만 한다
    if(!await saveQuoteRecord(Q)) alert('견적서는 만들어졌지만 견적 보관에 실패했습니다.\n나중에 「견적 이력」에서 찾을 수 없으니 파일을 꼭 보관해 주세요.');
  }catch(e){
    alert('견적서를 만들지 못했습니다. 인터넷 연결을 확인하고 다시 눌러주세요.');
  }finally{
    host.innerHTML='';
    if(btn){ btn.disabled=false; btn.textContent=label||'📷 견적서'; }
  }
}

/* ══════════════════════════ 단계 접기 ══════════════════════════
   칸 크기는 손님에게 보여주기 좋은 크기 그대로 두되, 다 채운 칸은 한 줄로 접어서
   화면이 넘치지 않게 한다. 다른 칸을 만지는 순간 접히고, 제목줄이나 [수정]을 누르면 펴진다. */
const STEPS=['s1','s2','s3','s4','s5','s6'];
function stepDone(id){
  switch(id){
    case 's1': return !!$('#startDate').value && (+$('#pax').value>0);
    case 's2': return ROUTE.length>0;
    case 's3': {
      if(!useHotelOn()) return true;
      const stay=ROUTE.filter(r=>(+r.nights||0)>0);
      return stay.length>0 && stay.every(r=>hotelPick[r.region]!==undefined);
    }
    case 's4': return dayState.some(st=>st.round&&st.course);
    case 's5': return true;
    case 's6': return !useGuideOn() || !!$('#guide').value;
  }
  return false;
}
function stepSummary(id){
  const pax=Math.max(1,+$('#pax').value||1);
  const n=totalNights();
  switch(id){
    case 's1': {
      const team=($('#teamName').value||'').trim();
      const mark=[amDepOn()?'오전출발':'', amRetOn()?'오전출국':''].filter(Boolean).join(' · ');
      return [$('#startDate').value, team, `${pax}명`, `${n}박 ${n+1}일`, mark].filter(Boolean).join(' · ');
    }
    case 's2': return ROUTE.map(r=>`${r.region} ${+r.nights||0}박`).join(' → ');
    case 's3': {
      if(!useHotelOn()) return '숙소 없이';
      const out=[];
      ROUTE.forEach(r=>{
        const idx=hotelPick[r.region];
        if(!(+r.nights||0)||idx===undefined||idx==='') return;
        const h=((P.hotels||{})[r.region]||[])[+idx]; if(!h) return;
        const rt=hotelRoom[r.region]||'twin';
        out.push(`${r.region} ${h.name} ${hotelNightsOf(r)}박 ${ROOM_SHORT[rt]}${roomCount(pax,rt)}실`);
      });
      return out.join(' · ')||'숙소 미선택';
    }
    case 's4': {
      const done=dayState.filter(st=>st.round&&st.course);
      return done.length?`${done.length}회 · ${done.map(st=>st.course).join(', ')}`:'';
    }
    case 's5': {
      if(!useVehOn()) return '차량 없이';
      const g=(P.vehicleGroups||[])[+(($('#vehGroup')||{}).value||0)];
      return g?vehName(g):'';
    }
    case 's6': return useGuideOn()?($('#guide').value||''):'가이드 없이';
  }
  return '';
}
function renderStepSummaries(){
  STEPS.forEach(id=>{ const el=$('#sum'+id.slice(1)); if(el) el.textContent=stepSummary(id); });
}
/* 지금 만지고 있는 칸만 펴 두고, 다 채운 나머지는 접는다.
   아직 덜 채운 칸은 접지 않는다 — 뭘 더 해야 하는지 보여야 하니까. */
/* 한 번도 안 만져 본 칸은 접지 않는다 — 숙소·가이드처럼 기본값이 '없이'인 칸이
   손님에게 묻기도 전에 접혀 버리면 물어볼 항목이 있는 줄도 모르게 된다. */
const touched=new Set();
function autoFold(activeId){
  renderStepSummaries();
  STEPS.forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    el.classList.toggle('folded', id!==activeId && touched.has(id) && stepDone(id));
  });
}
document.addEventListener('focusin',e=>{
  const st=e.target.closest('.step');
  if(st) touched.add(st.id);
  autoFold(st?st.id:null);   // 견적 결과 쪽을 만지면(st 없음) 위 칸들이 전부 접힌다
});

/* ── 이벤트 ── */
// 지역 칩 클릭 / 빼기 / 접힌 칸 펴기
document.addEventListener('click',e=>{
  const ed=e.target.closest('.cedit,.steph');
  if(ed&&!e.target.closest('input,label,select,button')){
    const st=ed.closest('.step');
    if(st){ touched.add(st.id); autoFold(st.classList.contains('folded')?st.id:null); return; }
  }
  const pick=e.target.closest('[data-reg-pick]');
  if(pick){ toggleRegion(pick.dataset.regPick); return; }
  const del=e.target.closest('[data-reg-del]');
  if(del){
    const i=+del.dataset.regDel; const r=ROUTE[i];
    if(r){ delete hotelPick[r.region]; delete hotelNights[r.region]; delete hotelRoom[r.region]; }
    ROUTE.splice(i,1); refreshAll(); return;
  }
});
// 총 박수 / 지역별 박수 입력
document.addEventListener('input',e=>{
  const t=e.target;
  if(t.id==='nights'){
    applyTripToRoute(Math.max(0,Math.min(14,+t.value||0)));
    refreshAll();   // 입력 중인 칸은 syncTripInput이 건드리지 않는다
    return;
  }
  if(t.dataset.regN!==undefined){
    const i=+t.dataset.regN; if(!ROUTE[i]) return;
    ROUTE[i].nights=Math.max(0,+t.value||0);
    syncTripInput(); renderHotels(); buildDays(); calc();   // 칩은 다시 안 그림(입력 포커스 유지)
    return;
  }
  // 숙소 박수는 손으로 고친 값을 그대로 기억한다(지역 박수와 달라도 된다)
  if(t.dataset.hn!==undefined){ hotelNights[t.dataset.hn]=t.value; calc(); return; }
  if(t.id==='pax'||t.id==='teamName') calc();
});
document.addEventListener('change',e=>{
  const t=e.target;
  if(t.id==='startDate'){ buildDays(); calc(); return; }
  /* 오전 출발/오전 출국: 1일차·마지막날 라운딩 칸만 열고 닫는다
     (차량·가이드는 calc에서 풀 요금으로 바뀜). 다시 그리면 이미 체크해 둔
     다른 날 라운딩이 날아가므로 해당 칸만 손댄다. */
  if(t.id==='amDep'||t.id==='amRet'){ refreshDayLocks(); calc(); return; }
  // 접힌 채로 체크만 하면 고를 칸이 안 보이므로, 그 칸을 펴 준다
  if(t.id==='useHotel'){ renderHotels(); autoFold('s3'); calc(); return; }
  if(t.id==='useGuide'){ $('#guideWrap').style.display=t.checked?'':'none'; autoFold('s6'); calc(); return; }
  if(t.id==='vehGroup'){ calc(); return; }
  if(t.id==='noVeh'){ const w=$('#vehGroup'); if(w) w.closest('.f').style.display=t.checked?'none':''; autoFold('s5'); calc(); return; }
  if(t.dataset.hotel!==undefined){ hotelPick[t.dataset.hotel]=t.value; calc(); return; }
  if(t.dataset.hroom!==undefined){ hotelRoom[t.dataset.hroom]=t.value; calc(); return; }
  if(t.dataset.r!==undefined){ const i=+t.dataset.r; dayState[i].round=t.checked; const row=t.closest('.day'); row.classList.toggle('off',!t.checked); document.querySelector(`[data-c="${i}"]`).disabled=!t.checked; document.querySelector(`[data-h="${i}"]`).disabled=!t.checked; }
  if(t.dataset.reg!==undefined){ const i=+t.dataset.reg; dayState[i].region=t.value; dayState[i].course=''; fillCourses(i); }
  if(t.dataset.c!==undefined){ const i=+t.dataset.c; dayState[i].course=t.value; fillHoles(i); }
  if(t.dataset.h!==undefined){ const i=+t.dataset.h; dayState[i].holes=t.value; }
  calc();
});

let GROLE='agent', GROLE_MAP={};

function golfRoleOf(u){

const GROLE_LABEL={admin:'어드민',manager:'매니저',agent:'에이전트'};
async function loadPricing(){
  try{ const {data:row}=await sb.from('guide_data').select('data').eq('data_key','golf_pricing').single();
    if(row&&row.data){ const d=row.data; P={
      holidays:(d.holidays&&d.holidays.includes('2026-05-04'))?d.holidays:DEFAULT_PRICING.holidays,
      hotels:DEFAULT_PRICING.hotels,
      handlingPeriods:d.handlingPeriods||{}, guidePeriods:d.guidePeriods||{}, vehiclePeriods:d.vehiclePeriods||{},
      // 가이드 종류는 관리자에서 추가·삭제할 수 있다(없으면 저장된 요금의 종류를 그대로 씀)
      guideTypes:(Array.isArray(d.guideTypes)&&d.guideTypes.length)?d.guideTypes:Object.keys(d.guidePeriods||{}),
      // 차량: 지역 조합별 요금 열. 예전 데이터(단일 vehiclePeriods)만 있으면 한 열로 취급.
      vehicleGroups:(Array.isArray(d.vehicleGroups)&&d.vehicleGroups.length)
        ? d.vehicleGroups
        : [{id:'vg1',label:'기본',periods:d.vehiclePeriods||{}}],
      vehicleNotes:Array.isArray(d.vehicleNotes)?d.vehicleNotes:[],
      transfers:Array.isArray(d.transfers)?d.transfers:[]
    };
      // 저장된 골프장(새 구조)이 있으면 반영
      if(d.regions){ const fs=Object.values(d.regions)[0]?.courses?.[0]?.seasons?.[0];
        if(fs && fs.gf18!==undefined){
          const conv={}, hot={};
          Object.entries(d.regions).forEach(([reg,rv])=>{
            conv[reg]=(rv.courses||[]).map(c=>({ n:c.name, note:c.note||'', s:(c.seasons||[]).map(s=>({ from:s.from, to:s.to, g18:[s.gf18?.wd??null,s.gf18?.we??null], cad:s.caddie||0, crt:s.cart||0, g9:(s.gf9&&(s.gf9.wd!=null||s.gf9.we!=null))?[s.gf9.wd??null,s.gf9.we??null]:null, cad9:s.caddie9||0, crt9:s.cart9||0 })) }));
            if(rv.hotels&&rv.hotels.length) hot[reg]=rv.hotels;
          });
          Object.keys(COURSES).forEach(k=>delete COURSES[k]); Object.assign(COURSES,conv);
          if(Object.keys(hot).length) P.hotels=hot;

}
// 지역 목록은 관리자 코드관리('지역')에서 가져온다 — 관리자가 추가/수정/삭제하면 여기 바로 반영
async function loadRegionCodes(){
  try{
    const {data:row,error}=await sb.from('guide_data').select('data').eq('data_key','golf_codes').maybeSingle();
    if(!error&&row&&row.data){
      /* 환율: 코드관리 '환율'의 «사용중»인 첫 항목 라벨을 1밧당 원화로 읽는다.
         값이 없으면 한화 표기를 생략한다(잘못된 환율로 안내하지 않도록). */
      const fx=(row.data.fx||[]).find(x=>x&&x.active!==false&&parseFloat(x.label)>0);
      FX_RATE=fx?parseFloat(fx.label):0;
      if(Array.isArray(row.data.region)){
        const l=row.data.region.filter(r=>r.active!==false).map(r=>r.label).filter(Boolean);
        if(l.length){ REGIONS=l; return; }
      }
    }
  }catch(e){}
  REGIONS=REGION_FALLBACK.slice();
}
/* 가이드 선택지는 관리자 요금표에 등록된 종류를 그대로 쓴다.
   (예전엔 HTML에 두 개가 박혀 있어 관리자에서 종류를 추가해도 여기 안 나왔다) */
function buildGuideOptions(){
  const sel=$('#guide'); if(!sel) return;
  const cur=sel.value;
  const types=((P.guideTypes&&P.guideTypes.length)?P.guideTypes:Object.keys(P.guidePeriods||{})).filter(Boolean);
  const esc=s=>String(s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
  // '가이드 없이'는 6번 체크박스가 대신하므로 종류만 담는다
  sel.innerHTML=types.length
    ? types.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')
    : '<option value="">등록된 가이드 요금 없음</option>';
  if(cur && Array.prototype.some.call(sel.options,o=>o.value===cur)) sel.value=cur;
}

       </div>`;

async function gLogin(){ const id=($('#glid').value||'').trim(),pw=($('#glpw').value||'').trim(),err=$('#gerr'),btn=$('#gbtn'); err.textContent=''; if(!id||!pw){err.textContent='아이디·비밀번호를 입력하세요.';return;} btn.textContent='로그인 중...';btn.disabled=true;
